[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
via_ir = true
optimizer = true
optimizer_runs = 10000
evm_version = "cancun"
fs_permissions = [{ access = "read", path = "./" }]

[rpc_endpoints]
xlayer_testnet = "${RPC_URL}"

[etherscan]
xlayer_testnet = { key = "${OKLINK_API_KEY}", url = "https://www.oklink.com/api" }
